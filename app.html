<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Prompts - Flyers Inmobiliarios</title>
  <script src="https://unpkg.com/react@19/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; background: #f8fafc; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    // ========================
    // PROMPT GENERATOR
    // ========================
    const styleDescriptions = {
      minimalista: {
        aesthetic: 'clean minimalist',
        typography: 'thin sans-serif fonts with generous whitespace',
        layout: 'asymmetric grid with breathing room, single focal point',
        mood: 'serene, uncluttered, Scandinavian-inspired',
        elements: 'subtle thin lines, muted tones, flat icons, no gradients',
      },
      moderno: {
        aesthetic: 'bold contemporary',
        typography: 'geometric sans-serif fonts, strong weight contrast',
        layout: 'dynamic grid with overlapping elements and bold sections',
        mood: 'energetic, urban, tech-forward',
        elements: 'geometric shapes, vibrant accent colors, sharp edges, duotone overlays',
      },
      lujo: {
        aesthetic: 'opulent luxury',
        typography: 'elegant serif fonts with gold or metallic accents',
        layout: 'centered composition with ornamental framing',
        mood: 'exclusive, prestigious, high-end',
        elements: 'gold foil textures, marble patterns, fine borders, rich dark backgrounds',
      },
      rustico: {
        aesthetic: 'warm rustic',
        typography: 'hand-drawn or slab-serif fonts, earthy tones',
        layout: 'organic flow with natural textures as backgrounds',
        mood: 'cozy, natural, countryside charm',
        elements: 'wood textures, kraft paper backgrounds, nature motifs, warm earth tones',
      },
      elegante: {
        aesthetic: 'refined elegant',
        typography: 'classic serif paired with light sans-serif, balanced spacing',
        layout: 'symmetrical composition with subtle borders',
        mood: 'sophisticated, timeless, curated',
        elements: 'soft gradients, cream and charcoal palette, thin dividers, subtle shadows',
      },
    };

    const layoutVariations = [
      'a hero image taking up the top 60% with property details below in a card overlay',
      'a split layout with the property image on the left and text details on the right',
      'a full-bleed background image with text centered in a semi-transparent overlay box',
      'a vertical layout with the image at the top, a colored band with the price, and details at the bottom',
      'a collage-style layout with multiple image frames and text woven between them',
      'a magazine-style editorial layout with large typography as the focal point and the image secondary',
      'a diagonal split design where the image occupies one triangle and brand colors fill the other',
      'a card-based layout with rounded corners, the image inside a frame, and details listed below',
      'a full background image with a bottom gradient bar containing all text in a clean row',
      'a poster-style vertical layout with dramatic large price text at the top and image below',
    ];

    const copyVariations = [
      'headline emphasizing the location and neighborhood appeal',
      'headline focused on the lifestyle the property enables',
      'headline highlighting the investment opportunity and value',
      'headline using an aspirational call-to-action like "Tu nuevo hogar te espera"',
      'headline showcasing unique features and standout amenities',
      'headline with a question that engages the viewer emotionally',
      'headline using urgency like "Oportunidad unica" or "Ultimas unidades"',
      'headline centered on family and comfort',
      'headline with a bold, single-word impact statement followed by details',
      'headline that frames the property as a dream fulfilled',
    ];

    function generatePrompts(data) {
      const { precio, direccion, tipoPropiedad, descripcion, colorPrincipal, colorSecundario1, colorSecundario2, estilo } = data;
      const style = styleDescriptions[estilo];

      return layoutVariations.map((layout, i) => {
        return `Diseña un flyer inmobiliario profesional de alta calidad para publicar en redes sociales.

ESTILO VISUAL: ${style.aesthetic}
- Tipografia: ${style.typography}
- Composicion: ${style.layout}
- Atmosfera: ${style.mood}
- Elementos graficos: ${style.elements}

PALETA DE COLORES (usar exclusivamente):
- Color principal: ${colorPrincipal}
- Color secundario 1: ${colorSecundario1}
- Color secundario 2: ${colorSecundario2}

LAYOUT ESPECIFICO: Usa ${layout}.

COPY / TEXTO: Incluir un ${copyVariations[i]}.

INFORMACION DE LA PROPIEDAD:
- Tipo: ${tipoPropiedad}
- Precio: ${precio}
- Ubicacion: ${direccion}
- Detalles: ${descripcion}

INSTRUCCIONES ADICIONALES:
- El flyer debe verse como una pieza publicitaria profesional lista para publicar.
- Mantener coherencia visual completa con el estilo ${estilo}.
- La imagen adjunta del usuario debe integrarse como la foto principal de la propiedad.
- Incluir espacio para logo o marca del agente/inmobiliaria.
- Formato vertical optimizado para Instagram Stories o feed.
- Texto legible, jerarquia visual clara, sin saturar de informacion.`;
      });
    }

    // ========================
    // PROGRESS BAR
    // ========================
    const steps = [
      { num: 1, label: 'Textos' },
      { num: 2, label: 'Diseño' },
      { num: 3, label: 'Resultado' },
    ];

    function ProgressBar({ currentStep }) {
      return (
        <div className="bg-white border-b border-slate-200 px-6 py-4">
          <div className="max-w-3xl mx-auto flex items-center gap-2">
            {steps.map((s, i) => (
              <div key={s.num} className="flex items-center flex-1">
                <div className="flex items-center gap-3 flex-1">
                  <div
                    className={`w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold shrink-0 transition-colors ${
                      currentStep >= s.num
                        ? 'bg-indigo-600 text-white'
                        : 'bg-slate-200 text-slate-500'
                    }`}
                  >
                    {currentStep > s.num ? '✓' : s.num}
                  </div>
                  <span
                    className={`text-sm font-medium hidden sm:block ${
                      currentStep >= s.num ? 'text-indigo-600' : 'text-slate-400'
                    }`}
                  >
                    {s.label}
                  </span>
                </div>
                {i < steps.length - 1 && (
                  <div
                    className={`h-0.5 flex-1 mx-3 transition-colors ${
                      currentStep > s.num ? 'bg-indigo-600' : 'bg-slate-200'
                    }`}
                  />
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ========================
    // SIDEBAR
    // ========================
    function Sidebar({ history, onLoadEntry, onNewProject }) {
      const [collapsed, setCollapsed] = useState(true);

      return (
        <>
          <button
            onClick={() => setCollapsed(!collapsed)}
            className="md:hidden fixed top-3 left-3 z-50 bg-indigo-600 text-white p-2 rounded-lg shadow-lg"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>

          <aside
            className={`${
              collapsed ? '-translate-x-full' : 'translate-x-0'
            } md:translate-x-0 fixed md:relative z-40 w-72 h-screen bg-slate-900 text-white flex flex-col transition-transform`}
          >
            <div className="p-5 border-b border-slate-700">
              <h1 className="text-lg font-bold tracking-tight">🏠 Flyer Prompts</h1>
              <p className="text-xs text-slate-400 mt-1">Generador de prompts inmobiliarios</p>
            </div>

            <div className="p-4">
              <button
                onClick={() => { onNewProject(); setCollapsed(true); }}
                className="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors"
              >
                + Nuevo Proyecto
              </button>
            </div>

            <div className="flex-1 overflow-y-auto px-4 pb-4">
              <h2 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Historial</h2>
              {history.length === 0 ? (
                <p className="text-xs text-slate-500 italic">Sin historial aun</p>
              ) : (
                <ul className="space-y-1.5">
                  {history.map((entry, i) => (
                    <li key={entry.id || i}>
                      <button
                        onClick={() => { onLoadEntry(entry); setCollapsed(true); }}
                        className="w-full text-left px-3 py-2.5 rounded-lg hover:bg-slate-800 transition-colors group"
                      >
                        <p className="text-sm font-medium text-slate-200 truncate group-hover:text-white">
                          {entry.form.tipoPropiedad} — {entry.form.precio}
                        </p>
                        <p className="text-xs text-slate-500 truncate mt-0.5">{entry.form.direccion}</p>
                        <p className="text-xs text-slate-600 mt-1">{new Date(entry.date).toLocaleDateString('es-AR')}</p>
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div className="p-4 border-t border-slate-700">
              <p className="text-xs text-slate-500 text-center">v1.0 — Prompt Generator</p>
            </div>
          </aside>

          {!collapsed && (
            <div onClick={() => setCollapsed(true)} className="md:hidden fixed inset-0 bg-black/50 z-30" />
          )}
        </>
      );
    }

    // ========================
    // STEP 1 — TEXTOS
    // ========================
    const tiposPropiedad = ['Casa', 'Departamento', 'PH', 'Terreno', 'Local comercial', 'Oficina', 'Quinta', 'Duplex', 'Loft'];

    function Step1Textos({ form, updateField, onNext }) {
      const [errors, setErrors] = useState({});

      function validate() {
        const newErrors = {};
        if (!form.precio.trim()) newErrors.precio = 'El precio es obligatorio';
        if (!form.direccion.trim()) newErrors.direccion = 'La direccion es obligatoria';
        if (!form.tipoPropiedad.trim()) newErrors.tipoPropiedad = 'Selecciona un tipo de propiedad';
        if (!form.descripcion.trim()) newErrors.descripcion = 'La descripcion es obligatoria';
        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      }

      function handleNext() {
        if (validate()) onNext();
      }

      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Informacion de la propiedad</h2>
          <p className="text-slate-500 mb-8">Ingresa los datos principales para tus flyers.</p>

          <div className="space-y-5">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Precio de la propiedad</label>
              <input
                type="text"
                value={form.precio}
                onChange={e => updateField('precio', e.target.value)}
                placeholder="Ej: USD 185.000"
                className={`w-full px-4 py-2.5 rounded-lg border ${errors.precio ? 'border-red-400 bg-red-50' : 'border-slate-300'} focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition`}
              />
              {errors.precio && <p className="text-red-500 text-xs mt-1">{errors.precio}</p>}
            </div>

            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Direccion</label>
              <input
                type="text"
                value={form.direccion}
                onChange={e => updateField('direccion', e.target.value)}
                placeholder="Ej: Av. Libertador 1234, Buenos Aires"
                className={`w-full px-4 py-2.5 rounded-lg border ${errors.direccion ? 'border-red-400 bg-red-50' : 'border-slate-300'} focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition`}
              />
              {errors.direccion && <p className="text-red-500 text-xs mt-1">{errors.direccion}</p>}
            </div>

            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Tipo de propiedad</label>
              <select
                value={form.tipoPropiedad}
                onChange={e => updateField('tipoPropiedad', e.target.value)}
                className={`w-full px-4 py-2.5 rounded-lg border ${errors.tipoPropiedad ? 'border-red-400 bg-red-50' : 'border-slate-300'} focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white`}
              >
                <option value="">Seleccionar...</option>
                {tiposPropiedad.map(t => (<option key={t} value={t}>{t}</option>))}
              </select>
              {errors.tipoPropiedad && <p className="text-red-500 text-xs mt-1">{errors.tipoPropiedad}</p>}
            </div>

            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Descripcion / Detalles</label>
              <textarea
                value={form.descripcion}
                onChange={e => updateField('descripcion', e.target.value)}
                rows={4}
                placeholder="Ej: 3 ambientes, 2 baños, cochera, balcon con vista al rio..."
                className={`w-full px-4 py-2.5 rounded-lg border ${errors.descripcion ? 'border-red-400 bg-red-50' : 'border-slate-300'} focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none`}
              />
              {errors.descripcion && <p className="text-red-500 text-xs mt-1">{errors.descripcion}</p>}
            </div>
          </div>

          <div className="flex justify-end mt-10">
            <button onClick={handleNext} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">
              Siguiente →
            </button>
          </div>
        </div>
      );
    }

    // ========================
    // STEP 2 — DISEÑO
    // ========================
    const estilos = [
      { value: 'minimalista', label: 'Minimalista', desc: 'Limpio, espacioso, sin ruido visual' },
      { value: 'moderno', label: 'Moderno', desc: 'Geometrico, bold, tech-forward' },
      { value: 'lujo', label: 'Lujo', desc: 'Dorado, exclusivo, premium' },
      { value: 'rustico', label: 'Rustico', desc: 'Calido, natural, texturas organicas' },
      { value: 'elegante', label: 'Elegante', desc: 'Sofisticado, clasico, refinado' },
    ];

    function ColorInput({ label, value, onChange }) {
      return (
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>
          <div className="flex items-center gap-3">
            <input type="color" value={value} onChange={e => onChange(e.target.value)} className="w-12 h-10 rounded-lg border border-slate-300 cursor-pointer p-0.5" />
            <input type="text" value={value} onChange={e => onChange(e.target.value)} maxLength={7} className="flex-1 px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition font-mono text-sm" />
            <div className="w-10 h-10 rounded-lg border border-slate-200 shadow-inner" style={{ backgroundColor: value }} />
          </div>
        </div>
      );
    }

    function Step2Diseno({ form, updateField, onNext, onBack }) {
      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Diseño visual</h2>
          <p className="text-slate-500 mb-8">Defini la paleta de colores y el estilo de tus flyers.</p>

          <div className="space-y-5 mb-10">
            <ColorInput label="Color principal" value={form.colorPrincipal} onChange={v => updateField('colorPrincipal', v)} />
            <ColorInput label="Color secundario 1" value={form.colorSecundario1} onChange={v => updateField('colorSecundario1', v)} />
            <ColorInput label="Color secundario 2" value={form.colorSecundario2} onChange={v => updateField('colorSecundario2', v)} />
          </div>

          <div className="mb-10">
            <label className="block text-sm font-medium text-slate-700 mb-2">Preview de paleta</label>
            <div className="flex rounded-xl overflow-hidden h-14 shadow-sm border border-slate-200">
              <div className="flex-1" style={{ backgroundColor: form.colorPrincipal }} />
              <div className="flex-1" style={{ backgroundColor: form.colorSecundario1 }} />
              <div className="flex-1" style={{ backgroundColor: form.colorSecundario2 }} />
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-3">Estilo de diseño</label>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {estilos.map(s => (
                <button
                  key={s.value}
                  onClick={() => updateField('estilo', s.value)}
                  className={`text-left px-4 py-3.5 rounded-xl border-2 transition-all ${
                    form.estilo === s.value
                      ? 'border-indigo-600 bg-indigo-50 ring-1 ring-indigo-600'
                      : 'border-slate-200 hover:border-slate-300 bg-white'
                  }`}
                >
                  <p className={`font-semibold text-sm ${form.estilo === s.value ? 'text-indigo-700' : 'text-slate-700'}`}>{s.label}</p>
                  <p className="text-xs text-slate-500 mt-0.5">{s.desc}</p>
                </button>
              ))}
            </div>
          </div>

          <div className="flex justify-between mt-10">
            <button onClick={onBack} className="text-slate-600 hover:text-slate-800 font-medium py-2.5 px-6 rounded-lg transition-colors">← Anterior</button>
            <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Siguiente →</button>
          </div>
        </div>
      );
    }

    // ========================
    // STEP 3 — RESUMEN + OUTPUT
    // ========================
    const estiloLabels = {
      minimalista: 'Minimalista',
      moderno: 'Moderno',
      lujo: 'Lujo',
      rustico: 'Rustico',
      elegante: 'Elegante',
    };

    function Step3Resumen({ form, generatedPrompts, setGeneratedPrompts, addToHistory, onBack, onReset }) {
      const [copied, setCopied] = useState(null);
      const [allCopied, setAllCopied] = useState(false);

      function handleGenerate() {
        const prompts = generatePrompts(form);
        setGeneratedPrompts(prompts);
        addToHistory({
          id: Date.now(),
          date: new Date().toISOString(),
          form: { ...form },
          prompts,
        });
      }

      function copyOne(text, index) {
        navigator.clipboard.writeText(text);
        setCopied(index);
        setTimeout(() => setCopied(null), 1500);
      }

      function copyAll() {
        const allText = generatedPrompts.map((p, i) => `=== PROMPT ${i + 1} ===\n\n${p}`).join('\n\n\n');
        navigator.clipboard.writeText(allText);
        setAllCopied(true);
        setTimeout(() => setAllCopied(false), 2000);
      }

      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Resumen y prompts</h2>
          <p className="text-slate-500 mb-8">Revisa la info y genera tus prompts.</p>

          <div className="bg-white rounded-xl border border-slate-200 p-6 mb-8 shadow-sm">
            <h3 className="font-semibold text-slate-700 mb-4 text-sm uppercase tracking-wider">Resumen</h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
              <div><span className="text-slate-500">Tipo:</span><span className="ml-2 font-medium text-slate-800">{form.tipoPropiedad}</span></div>
              <div><span className="text-slate-500">Precio:</span><span className="ml-2 font-medium text-slate-800">{form.precio}</span></div>
              <div className="sm:col-span-2"><span className="text-slate-500">Direccion:</span><span className="ml-2 font-medium text-slate-800">{form.direccion}</span></div>
              <div className="sm:col-span-2"><span className="text-slate-500">Descripcion:</span><span className="ml-2 text-slate-700">{form.descripcion}</span></div>
            </div>
            <div className="mt-5 pt-5 border-t border-slate-100">
              <div className="flex items-center gap-4 flex-wrap">
                <span className="text-sm text-slate-500">Paleta:</span>
                {[form.colorPrincipal, form.colorSecundario1, form.colorSecundario2].map((c, i) => (
                  <div key={i} className="flex items-center gap-1.5">
                    <div className="w-6 h-6 rounded-md border border-slate-200" style={{ backgroundColor: c }} />
                    <span className="text-xs font-mono text-slate-600">{c}</span>
                  </div>
                ))}
                <span className="text-sm text-slate-500 ml-2">Estilo:</span>
                <span className="text-sm font-medium text-indigo-600">{estiloLabels[form.estilo]}</span>
              </div>
            </div>
          </div>

          {!generatedPrompts && (
            <div className="text-center mb-8">
              <button onClick={handleGenerate} className="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-10 rounded-xl transition-colors shadow-md text-lg">
                Generar 10 Prompts
              </button>
            </div>
          )}

          {generatedPrompts && (
            <div>
              <div className="flex items-center justify-between mb-5">
                <h3 className="font-semibold text-slate-700">Prompts generados ({generatedPrompts.length})</h3>
                <button
                  onClick={copyAll}
                  className={`text-sm font-medium py-2 px-5 rounded-lg transition-colors ${allCopied ? 'bg-green-100 text-green-700' : 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200'}`}
                >
                  {allCopied ? '✓ Copiados todos' : 'Copiar todos los prompts'}
                </button>
              </div>

              <div className="space-y-4">
                {generatedPrompts.map((prompt, i) => (
                  <div key={i} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="flex items-center justify-between px-5 py-3 bg-slate-50 border-b border-slate-100">
                      <span className="text-sm font-semibold text-slate-600">Prompt {i + 1}</span>
                      <button
                        onClick={() => copyOne(prompt, i)}
                        className={`text-xs font-medium py-1.5 px-4 rounded-md transition-colors ${copied === i ? 'bg-green-100 text-green-700' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}
                      >
                        {copied === i ? '✓ Copiado' : 'Copiar'}
                      </button>
                    </div>
                    <pre className="p-5 text-sm text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">{prompt}</pre>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex justify-between mt-10">
            <button onClick={onBack} className="text-slate-600 hover:text-slate-800 font-medium py-2.5 px-6 rounded-lg transition-colors">← Anterior</button>
            {generatedPrompts && (
              <button onClick={onReset} className="bg-slate-800 hover:bg-slate-700 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">
                Nuevo proyecto
              </button>
            )}
          </div>
        </div>
      );
    }

    // ========================
    // APP
    // ========================
    const INITIAL_FORM = {
      precio: '',
      direccion: '',
      tipoPropiedad: '',
      descripcion: '',
      colorPrincipal: '#1a1a2e',
      colorSecundario1: '#16213e',
      colorSecundario2: '#e94560',
      estilo: 'moderno',
    };

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem('promptHistory') || '[]'); }
      catch { return []; }
    }

    function App() {
      const [step, setStep] = useState(1);
      const [form, setForm] = useState(INITIAL_FORM);
      const [history, setHistory] = useState(loadHistory);
      const [generatedPrompts, setGeneratedPrompts] = useState(null);

      useEffect(() => {
        localStorage.setItem('promptHistory', JSON.stringify(history));
      }, [history]);

      function updateField(field, value) {
        setForm(prev => ({ ...prev, [field]: value }));
      }

      function addToHistory(entry) {
        setHistory(prev => [entry, ...prev].slice(0, 20));
      }

      function loadFromHistory(entry) {
        setForm(entry.form);
        setGeneratedPrompts(entry.prompts);
        setStep(3);
      }

      function resetForm() {
        setForm(INITIAL_FORM);
        setGeneratedPrompts(null);
        setStep(1);
      }

      return (
        <div className="flex h-screen bg-slate-50">
          <Sidebar history={history} onLoadEntry={loadFromHistory} onNewProject={resetForm} />
          <div className="flex-1 flex flex-col min-w-0">
            <ProgressBar currentStep={step} />
            <main className="flex-1 overflow-y-auto p-6 md:p-10">
              <div className="max-w-3xl mx-auto">
                {step === 1 && <Step1Textos form={form} updateField={updateField} onNext={() => setStep(2)} />}
                {step === 2 && <Step2Diseno form={form} updateField={updateField} onNext={() => setStep(3)} onBack={() => setStep(1)} />}
                {step === 3 && <Step3Resumen form={form} generatedPrompts={generatedPrompts} setGeneratedPrompts={setGeneratedPrompts} addToHistory={addToHistory} onBack={() => setStep(2)} onReset={resetForm} />}
              </div>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
