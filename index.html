<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Prompts - Flyers Inmobiliarios</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; background: #f8fafc; }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect } = React;

    // ========================
    // PROMPT GENERATOR
    // ========================
    const styleVariants = {
      minimalista: [
        {
          name: 'Minimalismo con degradados (modern tech)',
          rules: `COMPOSICION:
- Imagen full bleed ocupando todo el fondo
- Elementos flotando sobre la imagen (sin cajas rigidas multiples)
- Maximo 2 overlays

JERARQUIA:
1. Imagen
2. Precio (foco absoluto)
3. CTA
4. Texto secundario

TIPOGRAFIA:
- Sans-serif moderna (thin/regular)
- Precio puede usar semi-bold
- Tracking ligeramente abierto

DEGRADADOS:
- Solo en CTA, overlays o highlights
- Gradientes suaves (linear o radial)
- No usar degradados en todo el fondo

GLASS (OBLIGATORIO):
- Precio dentro de caja translucida
- Fondo blanco 10-20% opacidad
- Blur leve (10-20px)
- Borde blanco sutil (1px, baja opacidad)
- Border-radius 12-20px

GLOW:
- Solo en precio o CTA
- Muy sutil, no neon

CTA:
- Boton redondeado
- Sombra leve
- Alto contraste

ATMOSFERA:
- Moderna, tecnologica, limpia
- Sensacion de producto digital premium
- Iluminacion suave con acentos brillantes
- Estetica tipo app / fintech / SaaS

RESTRICCIONES:
- No mas de 3 bloques
- No iconos
- No layout tipo tarjeta multiple

OBJETIVO: Look SaaS / fintech / moderno premium`
        },
      ],
      moderno: [
        {
          name: 'Moderno geometrico bold',
          rules: `COMPOSICION:
- Formas geometricas grandes (rectangulos, circulos) como marcos o fondos
- Imagen recortada en formas no convencionales
- Bloques de color solido con opacidad alta (70-90%)

JERARQUIA:
1. Precio o headline impactante
2. Imagen integrada en formas
3. CTA prominente

TIPOGRAFIA:
- Geometric sans-serif, peso bold y extrabold
- Contraste fuerte entre titulo y cuerpo
- Tracking cerrado en headlines

ELEMENTOS:
- Acentos de color vibrantes
- Sin bordes redondeados suaves, todo angular
- Overlays de color solido

ATMOSFERA:
- Energica, urbana, impactante
- Sensacion de marca fuerte
- Estetica de agencia creativa
- Alto impacto visual

RESTRICCIONES:
- No degradados suaves
- No elementos organicos
- No tipografia decorativa

OBJETIVO: Maximo impacto visual con geometria`
        },
      ],
      lujo: [
        {
          name: 'Lujo clasico con oro',
          rules: `COMPOSICION:
- Fondo oscuro (negro, azul marino profundo)
- Imagen con marco dorado fino
- Elementos centrados y simetricos

JERARQUIA:
1. Imagen enmarcada
2. Precio con acento dorado
3. Headline elegante

TIPOGRAFIA:
- Serif elegante, peso regular o light
- Tracking generoso
- Dorado en precio o headline

ELEMENTOS:
- Acentos dorados (bordes, lineas, tipografia)
- Ornamentos clasicos sutiles (lineas decorativas, motivos geometricos)
- Espaciado generoso entre elementos

ATMOSFERA:
- Exclusiva, tradicional
- Sensacion de club privado o marca heritage
- Estetica de joyeria o relojeria
- Opulencia controlada

RESTRICCIONES:
- No colores brillantes fuera del dorado
- No tipografia moderna/geometrica
- No elementos casuales

OBJETIVO: Look clasico de lujo con acentos dorados`
        },
        {
          name: 'Lujo editorial nocturno',
          rules: `ESTILO VISUAL:
- Real estate premium de lujo con estetica editorial
- Render arquitectonico hiperrealista + iluminacion cinematografica
- Look corporativo elegante (desarrolladora internacional)

REGLAS DE DISENO:
- Composicion vertical con foco en arquitectura
- Alto contraste: fondo frio vs luces calidas
- Uso de bloques oscuros para destacar datos
- Amplio espacio negativo en lado izquierdo
- Estetica limpia, sin saturacion

COMPOSICION:
- Edificio en perspectiva 3/4 ocupando lado derecho
- Fondo con cielo degradado oscuro
- Texto principal en esquina superior izquierda
- Datos en bloques alineados debajo
- Base con fade blanco para integracion

JERARQUIA:
1. Titulo principal (nombre del proyecto)
2. Subtitulo/script
3. Imagen del edificio
4. Datos clave (stories / sqft)
5. Ubicacion
6. Marca

TIPOGRAFIA:
- Serif elegante (alto contraste) para titulo
- Script fina para subtitulo
- Sans serif para datos
- Mayusculas en titulos
- Colores dorado/beige y blanco

DEGRADADOS:
- Fondo: azul profundo a verde azulado
- Transiciones suaves
- Fade blanco inferior para base
- Sin degradados agresivos

GLASS (OBLIGATORIO):
- Reemplazar bloques negros por glass blur sutil 15-25%

GLOW:
- Glow calido en ventanas del edificio
- Iluminacion interna protagonista
- Sin glow en textos

ATMOSFERA:
- Sofisticada, nocturna, aspiracional
- Lujo moderno y exclusividad
- Sensacion de alto valor

RESTRICCIONES:
- No colores saturados
- No exceso de elementos
- No tipografias modernas/tech
- No multiples focos visuales
- No CTA invasivo

INSTRUCCIONES ADICIONALES:
- Priorizar iluminacion calida interior
- Mantener aire visual en lado izquierdo
- Enfatizar perspectiva arquitectonica
- Estetica editorial, no agresiva
- Balance entre imagen y tipografia

OBJETIVO: Branding y posicionamiento premium, transmitir lujo, escala y categoria`
        },
      ],
      rustico: [
        {
          name: 'Rustico con texturas naturales',
          rules: `COMPOSICION:
- Fondo con textura de madera, piedra o papel kraft
- Imagen con bordes suaves o efecto polaroid
- Elementos organicos distribuidos

JERARQUIA:
1. Imagen como foto enmarcada
2. Headline calido
3. Precio y datos

TIPOGRAFIA:
- Slab-serif o hand-drawn
- Pesos regulares
- Tracking natural

ELEMENTOS:
- Iconografia simple y organica (hojas, casas, arboles)
- Colores tierra: marron, beige, verde oliva, terracota
- Sin elementos digitales o tech

ATMOSFERA:
- Calida, artesanal
- Sensacion de mercado local o feria
- Estetica de taller o estudio
- Autenticidad y calidez

RESTRICCIONES:
- No elementos digitales
- No gradientes artificiales
- No tipografia geometrica

OBJETIVO: Look artesanal con texturas naturales`
        },
      ],
      elegante: [
        {
          name: 'Elegante clasico simetrico',
          rules: `COMPOSICION:
- Composicion perfectamente centrada y simetrica
- Imagen enmarcada con borde fino
- Espaciado generoso y uniforme

JERARQUIA:
1. Imagen centrada
2. Headline serif clasico
3. Precio y datos alineados

TIPOGRAFIA:
- Serif clasica, peso regular
- Tracking natural a amplio
- Maxima legibilidad

ELEMENTOS:
- Lineas divisorias finas (hairline) como separadores
- Paleta contenida: crema, gris, negro, un acento sutil
- Sensacion de tarjeta de presentacion

ATMOSFERA:
- De tarjeta de presentacion premium
- Sensacion de formalidad y confianza
- Estetica de despacho de abogados
- Orden y profesionalismo

RESTRICCIONES:
- No asimetria
- No elementos casuales
- No tipografia moderna

OBJETIVO: Look clasico simetrico y profesional`
        },
      ],
    };

    const tamanoDescriptions = {
      story: 'formato vertical Story/Reel de 1080x1920px (relacion 9:16)',
      cuadrado: 'formato cuadrado de 1080x1080px (relacion 1:1) para feed',
      semi_vertical: 'formato semi-vertical de 1080x1350px (relacion 4:5) para feed',
      horizontal: 'formato horizontal de 1080x566px (relacion 1.91:1) para carrusel o anuncio',
      reel: 'formato vertical Reel de 1080x1920px (relacion 9:16)',
      portada: 'formato cuadrado de 1080x1080px (relacion 1:1) para portada de perfil',
    };

    function generatePrompts(data) {
      const { precio, direccion, tipoPropiedad, descripcion, colorPrincipal, colorSecundario1, colorSecundario2, estilo, tamano } = data;
      const variants = styleVariants[estilo];
      const tamanoDesc = tamanoDescriptions[tamano] || tamanoDescriptions['story'];

      var variant = variants[data.variantIndex || 0] || variants[0];
      var photoSection = data.photoBase64
        ? 'IMAGEN DE LA PROPIEDAD:\n- Se adjunta la foto real de la propiedad. DEBES usarla como imagen principal del flyer, integrandola en la composicion segun el estilo indicado. No ignores esta imagen.'
        : 'IMAGEN DE LA PROPIEDAD:\n- No se proporciono foto. Genera una imagen de fondo apropiada para el tipo de propiedad indicada.';
      var logoSection = data.logoBase64
        ? 'LOGO DE LA EMPRESA (OBLIGATORIO):\n- Se adjunta el logo de la empresa como imagen. DEBES incluirlo en el flyer tal como es, sin modificarlo ni alterarlo.\n- Ubicarlo en una zona secundaria segun el estilo (esquina inferior, cabecera, etc.) de forma visible pero sin dominar la composicion.\n- Respetar proporciones y transparencias del logo original.'
        : '';
      var tituloHeader = data.titulo && data.titulo.trim() ? '⚠ INSTRUCCION CRITICA: El flyer DEBE mostrar el siguiente titulo como headline principal, con la maxima jerarquia visual posible, grande y prominente: "' + data.titulo.trim() + '". No lo omitas bajo ningun concepto.\n\n' : '';
      return tituloHeader + 'Diseña un flyer inmobiliario profesional de alta calidad para publicar en redes sociales.\n\nESTILO VISUAL: ' + variant.name + '\nReglas de diseno:\n' + variant.rules + '\n\nPALETA DE COLORES (usar exclusivamente):\n- Color principal: ' + colorPrincipal + '\n- Color secundario 1: ' + colorSecundario1 + '\n- Color secundario 2: ' + colorSecundario2 + '\n\nINFORMACION DE LA PROPIEDAD:\n- Tipo: ' + tipoPropiedad + '\n- Precio: ' + precio + '\n- Ubicacion: ' + direccion + '\n- Detalles: ' + descripcion + '\n\n' + photoSection + (logoSection ? '\n\n' + logoSection : '') + '\n\nINSTRUCCIONES ADICIONALES:\n- El flyer debe verse como una pieza publicitaria profesional lista para publicar.\n- Mantener coherencia visual completa con el estilo ' + variant.name + '.\n- Formato: ' + tamanoDesc + '.\n- Texto legible, jerarquia visual clara, sin saturar de informacion.';
    }

    // ========================
    // INDEXEDDB - imagen completa persistente
    // ========================
    function openDB() {
      return new Promise(function(resolve, reject) {
        var req = indexedDB.open('FlyerDesigns', 1);
        req.onupgradeneeded = function(e) { e.target.result.createObjectStore('images', { keyPath: 'id' }); };
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror = function(e) { reject(e.target.error); };
      });
    }
    async function dbSaveImage(id, imageUrl) {
      try { var db = await openDB(); await new Promise(function(res, rej) { var tx = db.transaction('images', 'readwrite'); tx.objectStore('images').put({ id: id, imageUrl: imageUrl }); tx.oncomplete = res; tx.onerror = rej; }); } catch(e) {}
    }
    async function dbGetImage(id) {
      try { var db = await openDB(); return await new Promise(function(res) { var tx = db.transaction('images', 'readonly'); var req = tx.objectStore('images').get(id); req.onsuccess = function(e) { res(e.target.result ? e.target.result.imageUrl : null); }; req.onerror = function() { res(null); }; }); } catch(e) { return null; }
    }
    async function dbDeleteImage(id) {
      try { var db = await openDB(); await new Promise(function(res) { var tx = db.transaction('images', 'readwrite'); tx.objectStore('images').delete(id); tx.oncomplete = res; tx.onerror = res; }); } catch(e) {}
    }
    async function dbDeleteAll() {
      try { var db = await openDB(); await new Promise(function(res) { var tx = db.transaction('images', 'readwrite'); tx.objectStore('images').clear(); tx.oncomplete = res; tx.onerror = res; }); } catch(e) {}
    }

    // ========================
    // PROGRESS BAR
    // ========================
    const steps = [
      { num: 1, label: 'Textos' },
      { num: 2, label: 'Diseño' },
      { num: 3, label: 'Resultado' },
    ];

    function ProgressBar({ currentStep }) {
      return (
        <div className="bg-white border-b border-slate-200 px-6 py-4">
          <div className="max-w-3xl mx-auto flex items-center gap-2">
            {steps.map((s, i) => (
              <div key={s.num} className="flex items-center flex-1">
                <div className="flex items-center gap-3 flex-1">
                  <div className={'w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold shrink-0 transition-colors ' + (currentStep >= s.num ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-500')}>
                    {currentStep > s.num ? '✓' : s.num}
                  </div>
                  <span className={'text-sm font-medium hidden sm:block ' + (currentStep >= s.num ? 'text-indigo-600' : 'text-slate-400')}>
                    {s.label}
                  </span>
                </div>
                {i < steps.length - 1 && (
                  <div className={'h-0.5 flex-1 mx-3 transition-colors ' + (currentStep > s.num ? 'bg-indigo-600' : 'bg-slate-200')} />
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ========================
    // SIDEBAR
    // ========================
    function createThumbnail(dataUrl) {
      return new Promise(function(resolve) {
        var img = new Image();
        img.onload = function() {
          var maxW = 240;
          var ratio = Math.min(maxW / img.width, 1);
          var canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.65));
        };
        img.onerror = function() { resolve(null); };
        img.src = dataUrl;
      });
    }

    function Sidebar({ history, onLoadEntry, onNewProject, onClearHistory, apiKey, onApiKeyChange, savedDesigns, onDeleteDesign }) {
      const [collapsed, setCollapsed] = useState(true);
      const [activeTab, setActiveTab] = useState('api');
      const [showKey, setShowKey] = useState(false);
      const [keyInput, setKeyInput] = useState(apiKey || '');
      const [apiSaved, setApiSaved] = useState(false);

      function saveKey() {
        onApiKeyChange(keyInput.trim());
        setApiSaved(true);
        setTimeout(function() { setApiSaved(false); }, 1500);
      }

      var tabs = [
        { id: 'api', label: 'API' },
        { id: 'historial', label: 'Historial' },
        { id: 'disenos', label: 'Mis diseños' },
      ];

      return (
        <>
          <button onClick={function() { setCollapsed(!collapsed); }} className="md:hidden fixed top-3 left-3 z-50 bg-indigo-600 text-white p-2 rounded-lg shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
          </button>
          <aside className={(collapsed ? '-translate-x-full' : 'translate-x-0') + ' md:translate-x-0 fixed md:relative z-40 w-72 h-screen bg-slate-900 text-white flex flex-col transition-transform'}>

            {/* Header */}
            <div className="p-5 border-b border-slate-700 shrink-0">
              <h1 className="text-lg font-bold tracking-tight">🏠 Flyer Prompts</h1>
              <p className="text-xs text-slate-400 mt-1">Generador de prompts inmobiliarios</p>
            </div>

            {/* Nuevo proyecto */}
            <div className="px-4 pt-4 pb-3 shrink-0">
              <button onClick={function() { onNewProject(); setCollapsed(true); }} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors">+ Nuevo Proyecto</button>
            </div>

            {/* Tabs nav */}
            <div className="flex px-4 gap-1 shrink-0 mb-3">
              {tabs.map(function(tab) { return (
                <button
                  key={tab.id}
                  onClick={function() { setActiveTab(tab.id); }}
                  className={'flex-1 text-xs font-medium py-1.5 rounded-lg transition-colors ' + (activeTab === tab.id ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800')}
                >
                  {tab.label}
                  {tab.id === 'disenos' && savedDesigns.length > 0 && (
                    <span className="ml-1 bg-indigo-600 text-white text-xs rounded-full px-1.5 py-0.5">{savedDesigns.length}</span>
                  )}
                </button>
              ); })}
            </div>

            {/* Tab content */}
            <div className="flex-1 overflow-y-auto px-4 pb-4">

              {/* API tab */}
              {activeTab === 'api' && (
                <div className="bg-slate-800 rounded-xl p-4 border border-slate-700">
                  <div className="flex items-center gap-2 mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-yellow-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                    <span className="text-xs font-semibold text-slate-300 uppercase tracking-wider">API de Imagen</span>
                    {apiKey && <span className="ml-auto text-green-400 text-xs">● Activa</span>}
                  </div>
                  <div className="relative mb-2">
                    <input
                      type={showKey ? 'text' : 'password'}
                      value={keyInput}
                      onChange={function(e) { setKeyInput(e.target.value); }}
                      onKeyDown={function(e) { if (e.key === 'Enter') saveKey(); }}
                      placeholder="Pegá tu API key aquí"
                      className="w-full bg-slate-900 text-slate-200 text-xs px-3 py-2 rounded-lg border border-slate-600 focus:outline-none focus:ring-1 focus:ring-indigo-500 pr-8 font-mono"
                    />
                    <button onClick={function() { setShowKey(!showKey); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                      {showKey
                        ? <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" /></svg>
                        : <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                      }
                    </button>
                  </div>
                  <button onClick={saveKey} className={'w-full text-xs font-medium py-1.5 rounded-lg transition-colors ' + (apiSaved ? 'bg-green-600 text-white' : 'bg-indigo-600 hover:bg-indigo-500 text-white')}>
                    {apiSaved ? '✓ Guardada' : 'Guardar key'}
                  </button>
                  {apiKey && (
                    <button onClick={function() { setKeyInput(''); onApiKeyChange(''); }} className="w-full text-xs text-slate-500 hover:text-red-400 mt-1.5 transition-colors">
                      Borrar key
                    </button>
                  )}
                  <p className="text-xs text-slate-600 mt-3">Modelo se selecciona automáticamente (Google AI Studio).</p>
                </div>
              )}

              {/* Historial tab */}
              {activeTab === 'historial' && (
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Historial</span>
                    <button
                      onClick={function() { if (confirm('¿Eliminar todo el historial?')) onClearHistory(); }}
                      disabled={history.length === 0}
                      className={'transition-colors ' + (history.length > 0 ? 'text-slate-500 hover:text-red-400' : 'text-slate-700 cursor-not-allowed')}
                      title="Eliminar historial"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                  </div>
                  {history.length === 0 ? (
                    <p className="text-xs text-slate-500 italic">Sin historial aún</p>
                  ) : (
                    <ul className="space-y-1.5">
                      {history.map(function(entry, i) { return (
                        <li key={entry.id || i}>
                          <button onClick={function() { onLoadEntry(entry); setCollapsed(true); }} className="w-full text-left px-3 py-2.5 rounded-lg hover:bg-slate-800 transition-colors group">
                            <p className="text-sm font-medium text-slate-200 truncate group-hover:text-white">{entry.form.tipoPropiedad} — {entry.form.precio}</p>
                            <p className="text-xs text-slate-500 truncate mt-0.5">{entry.form.direccion}</p>
                            <p className="text-xs text-slate-600 mt-1">{new Date(entry.date).toLocaleDateString('es-AR')}</p>
                          </button>
                        </li>
                      ); })}
                    </ul>
                  )}
                </div>
              )}

              {/* Mis diseños tab */}
              {activeTab === 'disenos' && (
                <div>
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Mis diseños</span>
                    {savedDesigns.length > 0 && (
                      <button
                        onClick={function() { if (confirm('¿Eliminar todos los diseños?')) onDeleteDesign('all'); }}
                        className="text-slate-500 hover:text-red-400 transition-colors"
                        title="Eliminar todos"
                      >

    // ========================

    const tiposPropiedad = ['Casa', 'Departamento', 'PH', 'Terreno', 'Local comercial', 'Oficina', 'Quinta', 'Duplex', 'Loft'];

        setErrors(ne);
        return Object.keys(ne).length === 0;
      }
      function handleNext() { if (validate()) onNext(); }

      function handlePhoto(e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          var dataUrl = ev.target.result;
          var base64 = dataUrl.split(',')[1];
          updateField('photoBase64', base64);
          updateField('photoMime', file.type);
          updateField('photoPreview', dataUrl);

      function removePhoto() {

      function inp(field, label, placeholder, isTextarea) {

              <input type="text" value={form[field]} onChange={function(e) { updateField(field, e.target.value); }} placeholder={placeholder} className={cls} />

                    title="Quitar logo"

                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                  </button>
                </div>
              )}
            </div>
          </div>
          <div className="flex justify-end mt-10">
            <button onClick={handleNext} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Siguiente →</button>
          </div>

    // ========================

    function Step2Diseno({ form, updateField, onNext, onBack }) {

            <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Siguiente →</button>
          </div>
        </div>
      );
    }

    // ========================
    // STEP 3
    // ========================
    const ESTILOS_LIST = [
      { value: 'minimalista', label: 'Minimalista', desc: 'Limpio, espacioso, sin ruido visual', variantIndex: 0 },
      { value: 'moderno', label: 'Moderno', desc: 'Geometrico, bold, tech-forward', variantIndex: 0 },
      { value: 'lujo', label: 'Lujo clasico', desc: 'Dorado, exclusivo, premium', variantIndex: 0 },
      { value: 'lujo', label: 'Lujo editorial nocturno', desc: 'Editorial, nocturno, aspiracional', variantIndex: 1 },
      { value: 'rustico', label: 'Rustico', desc: 'Calido, natural, texturas organicas', variantIndex: 0 },
      { value: 'elegante', label: 'Elegante', desc: 'Sofisticado, clasico, refinado', variantIndex: 0 },
    ];

    function StyleGeneratorBox({ estilo, form, apiKey, onSaveDesign }) {
      const [generating, setGenerating] = useState(false);
      const [status, setStatus] = useState(null);
      const [imageUrl, setImageUrl] = useState(null);
      const [error, setError] = useState(null);

      async function handleGenerate() {
        if (!apiKey) return;
        setGenerating(true);
        setError(null);
        setImageUrl(null);
        var promptData = Object.assign({}, form, { estilo: estilo.value, variantIndex: estilo.variantIndex || 0 });
        var prompt = generatePrompts(promptData);
        try {
          var url = await generateImageWithGemini(prompt, apiKey, setStatus, form.photoBase64, form.photoMime, form.logoBase64, form.logoMime, aspectRatioMap[form.tamano] || '1:1');
          setImageUrl(url);
          if (onSaveDesign) onSaveDesign(url, estilo.label + ' — ' + form.tipoPropiedad + ' — ' + form.precio);
        } catch (e) {
          setError(e.message || 'Error desconocido');
        } finally {
          setGenerating(false);
          setStatus(null);
        }
      }

      function downloadImage() {
        var a = document.createElement('a');
        a.href = imageUrl;
        a.download = 'flyer-' + estilo.value + '-' + Date.now() + '.png';
        a.click();
      }

      return (
        <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between gap-4">
            <div className="min-w-0">
              <p className="font-semibold text-slate-700">{estilo.label}</p>
              <p className="text-xs text-slate-400 mt-0.5">{estilo.desc}</p>

            {apiKey ? (
              <button

                disabled={generating}
                className={'font-medium py-2 px-5 rounded-lg transition-all text-sm flex items-center gap-2 shrink-0 ' + (generating ? 'bg-slate-300 cursor-not-allowed text-white' : 'bg-violet-600 hover:bg-violet-500 text-white shadow-sm')}
              >
                {generating ? (
                  <>
                    <svg className="animate-spin h-4 w-4 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />

                ) : (

                    Generar con IA
                  </>

              </button>
            ) : (
              <span className="text-xs text-amber-600 font-medium shrink-0">Sin API key</span>

          </div>
          {generating && status && (

                  <svg xmlns="http://www.w3.org/2000/svg" className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>

    const estiloLabels = { minimalista: 'Minimalista', moderno: 'Moderno', lujo: 'Lujo', rustico: 'Rustico', elegante: 'Elegante' };

    const aspectRatioMap = {
      story: '9:16',
      reel: '9:16',
      cuadrado: '1:1',
      portada: '1:1',
      semi_vertical: '3:4',
      horizontal: '16:9',
    };

    const IMAGE_MODELS = [
      'gemini-2.5-flash-image',
      'gemini-3.1-flash-image-preview',
      'nano-banana-pro-preview',
      'gemini-3-pro-image-preview',
    ];

    async function tryModel(prompt, apiKey, model, photoBase64, photoMime, logoBase64, logoMime, aspectRatio) {
      var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + apiKey;
      var parts = [];
      if (photoBase64 && photoMime) {
        parts.push({ inlineData: { mimeType: photoMime, data: photoBase64 } });
      }
      if (logoBase64 && logoMime) {
        parts.push({ inlineData: { mimeType: logoMime, data: logoBase64 } });
      }
      parts.push({ text: prompt });
      var genConfig = { responseModalities: ['IMAGE', 'TEXT'] };
      if (aspectRatio) genConfig.aspectRatio = aspectRatio;
      var body = {
        contents: [{ parts: parts }],
        generationConfig: genConfig
      };
      var res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        var err = await res.json().catch(function() { return {}; });
        throw new Error((err.error && err.error.message) || 'Error ' + res.status);
      }
      var data = await res.json();
      var parts = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
      if (!parts) throw new Error('Sin imagen en la respuesta');
      var imgPart = parts.find(function(p) { return p.inlineData && p.inlineData.data; });
      if (!imgPart) throw new Error('Sin imagen en la respuesta');
      return 'data:' + imgPart.inlineData.mimeType + ';base64,' + imgPart.inlineData.data;
    }

    async function generateImageWithGemini(prompt, apiKey, onStatus, photoBase64, photoMime, logoBase64, logoMime, aspectRatio) {
      var lastError;
      for (var i = 0; i < IMAGE_MODELS.length; i++) {
        var model = IMAGE_MODELS[i];
        if (onStatus) onStatus('Generando con ' + model + '...');
        try {
          var url = await tryModel(prompt, apiKey, model, photoBase64, photoMime, logoBase64, logoMime, aspectRatio);
          if (onStatus) onStatus(null);
          return url;
        } catch (e) {
          lastError = e;
        }
      }
      throw new Error(lastError ? lastError.message : 'Ningun modelo disponible funciono.');
    }

    function Step3Resumen({ form, addToHistory, onBack, onReset, apiKey, onSaveDesign }) {
      useEffect(function() {
        var formForHistory = Object.assign({}, form, { photoBase64: null, photoMime: null, photoPreview: null, logoBase64: null, logoMime: null, logoPreview: null });
        addToHistory({ id: Date.now(), date: new Date().toISOString(), form: formForHistory });
      }, []);

      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Resumen y resultado</h2>
          <p className="text-slate-500 mb-8">Revisa la info y generá tu flyer en el estilo que prefieras.</p>
          <div className="bg-white rounded-xl border border-slate-200 p-6 mb-8 shadow-sm">
            <h3 className="font-semibold text-slate-700 mb-4 text-sm uppercase tracking-wider">Resumen</h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
              <div><span className="text-slate-500">Tipo:</span><span className="ml-2 font-medium text-slate-800">{form.tipoPropiedad}</span></div>
              <div><span className="text-slate-500">Precio:</span><span className="ml-2 font-medium text-slate-800">{form.precio}</span></div>
              <div className="sm:col-span-2"><span className="text-slate-500">Direccion:</span><span className="ml-2 font-medium text-slate-800">{form.direccion}</span></div>
              <div className="sm:col-span-2"><span className="text-slate-500">Descripcion:</span><span className="ml-2 text-slate-700">{form.descripcion}</span></div>
            </div>
            <div className="mt-5 pt-5 border-t border-slate-100">
              <div className="flex items-center gap-4 flex-wrap">
                <span className="text-sm text-slate-500">Paleta:</span>
                {[form.colorPrincipal, form.colorSecundario1, form.colorSecundario2].map(function(c, i) { return (
                  <div key={i} className="flex items-center gap-1.5">
                    <div className="w-6 h-6 rounded-md border border-slate-200" style={{ backgroundColor: c }} />
                    <span className="text-xs font-mono text-slate-600">{c}</span>
                  </div>
                ); })}
                <span className="text-sm text-slate-500 ml-2">Tamano:</span>
                <span className="text-sm font-medium text-indigo-600">{(tamanos.find(function(t) { return t.value === form.tamano; }) || {}).label || form.tamano}</span>
              </div>
            </div>
          </div>

          {!apiKey && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-center mb-6">
              <p className="text-sm text-amber-700">Agregá tu API key en el panel lateral para generar imágenes.</p>
            </div>
          )}

          <div className="space-y-5">
            {ESTILOS_LIST.map(function(estilo, i) {
              return (
                <StyleGeneratorBox key={estilo.value + '-' + i} estilo={estilo} form={form} apiKey={apiKey} onSaveDesign={onSaveDesign} />
              );
            })}
          </div>

          <div className="flex justify-between mt-10">
            <button onClick={onBack} className="text-slate-600 hover:text-slate-800 font-medium py-2.5 px-6 rounded-lg transition-colors">← Anterior</button>
            <button onClick={onReset} className="bg-slate-800 hover:bg-slate-700 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Nuevo proyecto</button>
          </div>
        </div>
      );
    }

    // ========================
    // APP
    // ========================
    const INITIAL_FORM = { titulo: '', precio: '', direccion: '', tipoPropiedad: '', descripcion: '', colorPrincipal: '#1a1a2e', colorSecundario1: '#16213e', colorSecundario2: '#e94560', estilo: 'moderno', variantIndex: 0, tamano: 'story', photoBase64: null, photoMime: null, photoPreview: null, logoBase64: null, logoMime: null, logoPreview: null };

    function loadHistory() { try { return JSON.parse(localStorage.getItem('promptHistory') || '[]'); } catch (e) { return []; } }
    function loadApiKey() { try { return localStorage.getItem('imageApiKey') || ''; } catch (e) { return ''; } }

    function loadSavedDesigns() {
      try { return JSON.parse(localStorage.getItem('savedDesigns') || '[]'); } catch(e) { return []; }
    }

    function App() {
      const [step, setStep] = useState(1);
      const [form, setForm] = useState(INITIAL_FORM);
      const [history, setHistory] = useState(loadHistory);
      const [generatedPrompts, setGeneratedPrompts] = useState(null);
      const [apiKey, setApiKey] = useState(loadApiKey);
      const [savedDesigns, setSavedDesigns] = useState(loadSavedDesigns);

      useEffect(function() { localStorage.setItem('promptHistory', JSON.stringify(history)); }, [history]);

      function handleApiKeyChange(key) { setApiKey(key); localStorage.setItem('imageApiKey', key); }
      function updateField(field, value) { setForm(function(prev) { var n = Object.assign({}, prev); n[field] = value; return n; }); }
      function addToHistory(entry) { setHistory(function(prev) { return [entry].concat(prev).slice(0, 20); }); }
      function loadFromHistory(entry) { setForm(entry.form); setGeneratedPrompts(entry.prompts); setStep(3); }
      function resetForm() { setForm(INITIAL_FORM); setGeneratedPrompts(null); setStep(1); }

      useEffect(function() {
        var metas = loadSavedDesigns();
        if (metas.length === 0) return;
        Promise.all(metas.map(function(d) {
          return dbGetImage(d.id).then(function(url) { return Object.assign({}, d, { imageUrl: url }); });
        })).then(function(designs) { setSavedDesigns(designs); });
      }, []);

      async function handleSaveDesign(imageUrl, label) {
        var thumbnail = await createThumbnail(imageUrl);
        var id = Date.now();
        var entry = { id: id, date: new Date().toISOString(), label: label, thumbnail: thumbnail, imageUrl: imageUrl };
        await dbSaveImage(id, imageUrl);
        setSavedDesigns(function(prev) {
          var next = [entry].concat(prev).slice(0, 30);
          try {
            var forStorage = next.map(function(d) { return { id: d.id, date: d.date, label: d.label, thumbnail: d.thumbnail }; });
            localStorage.setItem('savedDesigns', JSON.stringify(forStorage));
          } catch(e) {}
          return next;
        });
      }

      async function handleDeleteDesign(id) {
        if (id === 'all') {
          await dbDeleteAll();
          setSavedDesigns([]);
          localStorage.removeItem('savedDesigns');
        } else {
          await dbDeleteImage(id);
          setSavedDesigns(function(prev) {
            var next = prev.filter(function(d) { return d.id !== id; });
            try {
              var forStorage = next.map(function(d) { return { id: d.id, date: d.date, label: d.label, thumbnail: d.thumbnail }; });
              localStorage.setItem('savedDesigns', JSON.stringify(forStorage));
            } catch(e) {}
            return next;
          });
        }
      }

      return (
        <div className="flex h-screen bg-slate-50">
          <Sidebar
            history={history} onLoadEntry={loadFromHistory} onNewProject={resetForm} onClearHistory={function() { setHistory([]); }}
            apiKey={apiKey} onApiKeyChange={handleApiKeyChange}
            savedDesigns={savedDesigns} onDeleteDesign={handleDeleteDesign}
          />
          <div className="flex-1 flex flex-col min-w-0">
            <ProgressBar currentStep={step} />
            <main className="flex-1 overflow-y-auto p-6 md:p-10">
              <div className="max-w-3xl mx-auto">
                {step === 1 && <Step1Textos form={form} updateField={updateField} onNext={function() { setStep(2); }} />}
                {step === 2 && <Step2Diseno form={form} updateField={updateField} onNext={function() { setStep(3); }} onBack={function() { setStep(1); }} />}
                {step === 3 && <Step3Resumen form={form} addToHistory={addToHistory} onBack={function() { setStep(2); }} onReset={resetForm} apiKey={apiKey} onSaveDesign={handleSaveDesign} />}
              </div>
            </main>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
