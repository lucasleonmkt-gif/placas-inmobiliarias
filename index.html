          <aside className={(collapsed ? '-translate-x-full' : 'translate-x-0') + ' md:translate-x-0 fixed md:relative z-40 w-72 h-screen bg-slate-900 text-white flex flex-col transition-transform'}>
            <div className="p-5 border-b border-slate-700">
              <h1 className="text-lg font-bold tracking-tight">🏠 Flyer Prompts</h1>
              <p className="text-xs text-slate-400 mt-1">Generador de prompts inmobiliarios</p>
            </div>
            <div className="p-4">
              <button onClick={function() { onNewProject(); setCollapsed(true); }} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors">+ Nuevo Proyecto</button>
            </div>
            <div className="flex-1 overflow-y-auto px-4 pb-4">
              <h2 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Historial</h2>
              {history.length === 0 ? (
                <p className="text-xs text-slate-500 italic">Sin historial aun</p>
              ) : (
                <ul className="space-y-1.5">
                  {history.map(function(entry, i) { return (
                    <li key={entry.id || i}>
                      <button onClick={function() { onLoadEntry(entry); setCollapsed(true); }} className="w-full text-left px-3 py-2.5 rounded-lg hover:bg-slate-800 transition-colors group">
                        <p className="text-sm font-medium text-slate-200 truncate group-hover:text-white">{entry.form.tipoPropiedad} — {entry.form.precio}</p>
                        <p className="text-xs text-slate-500 truncate mt-0.5">{entry.form.direccion}</p>
                        <p className="text-xs text-slate-600 mt-1">{new Date(entry.date).toLocaleDateString('es-AR')}</p>
                      </button>
                    </li>
                  ); })}
                </ul>
              )}
            </div>
            <div className="p-4 border-t border-slate-700"><p className="text-xs text-slate-500 text-center">v1.0 — Prompt Generator</p></div>
          </aside>
          {!collapsed && (<div onClick={function() { setCollapsed(true); }} className="md:hidden fixed inset-0 bg-black/50 z-30" />)}
        </>
      );
    }

    // ========================
    // STEP 1
    // ========================
    const tiposPropiedad = ['Casa', 'Departamento', 'PH', 'Terreno', 'Local comercial', 'Oficina', 'Quinta', 'Duplex', 'Loft'];

    function Step1Textos({ form, updateField, onNext }) {
      const [errors, setErrors] = useState({});
      function validate() {
        var ne = {};
        if (!form.precio.trim()) ne.precio = 'El precio es obligatorio';
        if (!form.direccion.trim()) ne.direccion = 'La direccion es obligatoria';
        if (!form.tipoPropiedad.trim()) ne.tipoPropiedad = 'Selecciona un tipo de propiedad';
        if (!form.descripcion.trim()) ne.descripcion = 'La descripcion es obligatoria';
        setErrors(ne);
        return Object.keys(ne).length === 0;
      }
      function handleNext() { if (validate()) onNext(); }
      function inp(field, label, placeholder, isTextarea) {
        var cls = 'w-full px-4 py-2.5 rounded-lg border ' + (errors[field] ? 'border-red-400 bg-red-50' : 'border-slate-300') + ' focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition';
        return (
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>
            {isTextarea ? (
              <textarea value={form[field]} onChange={function(e) { updateField(field, e.target.value); }} rows={4} placeholder={placeholder} className={cls + ' resize-none'} />
            ) : (
              <input type="text" value={form[field]} onChange={function(e) { updateField(field, e.target.value); }} placeholder={placeholder} className={cls} />
            )}
            {errors[field] && <p className="text-red-500 text-xs mt-1">{errors[field]}</p>}
          </div>
        );
      }
      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Informacion de la propiedad</h2>
          <p className="text-slate-500 mb-8">Ingresa los datos principales para tus flyers.</p>
          <div className="space-y-5">
            {inp('precio', 'Precio de la propiedad', 'Ej: USD 185.000')}
            {inp('direccion', 'Direccion', 'Ej: Av. Libertador 1234, Buenos Aires')}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Tipo de propiedad</label>
              <select value={form.tipoPropiedad} onChange={function(e) { updateField('tipoPropiedad', e.target.value); }} className={'w-full px-4 py-2.5 rounded-lg border ' + (errors.tipoPropiedad ? 'border-red-400 bg-red-50' : 'border-slate-300') + ' focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white'}>
                <option value="">Seleccionar...</option>
                {tiposPropiedad.map(function(t) { return <option key={t} value={t}>{t}</option>; })}
              </select>
              {errors.tipoPropiedad && <p className="text-red-500 text-xs mt-1">{errors.tipoPropiedad}</p>}
            </div>
            {inp('descripcion', 'Descripcion / Detalles', 'Ej: 3 ambientes, 2 banos, cochera, balcon...', true)}
          </div>
          <div className="flex justify-end mt-10">
            <button onClick={handleNext} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Siguiente →</button>
          </div>
        </div>
      );
    }

    // ========================
    // STEP 2
    // ========================
    const tamanos = [
      { value: 'story', label: 'Historia / Story', desc: '1080 x 1920 px (9:16)' },
      { value: 'cuadrado', label: 'Cuadrado', desc: '1080 x 1080 px (1:1)' },
      { value: 'semi_vertical', label: 'Semi vertical', desc: '1080 x 1350 px (4:5)' },
      { value: 'horizontal', label: 'Horizontal', desc: '1080 x 566 px (1.91:1)' },
      { value: 'reel', label: 'Reel / Video', desc: '1080 x 1920 px (9:16)' },
      { value: 'portada', label: 'Portada de perfil', desc: '1080 x 1080 px (1:1)' },
    ];
    const estilos = [
      { value: 'minimalista', label: 'Minimalista', desc: 'Limpio, espacioso, sin ruido visual' },
      { value: 'moderno', label: 'Moderno', desc: 'Geometrico, bold, tech-forward' },
      { value: 'lujo', label: 'Lujo', desc: 'Dorado, exclusivo, premium' },
      { value: 'rustico', label: 'Rustico', desc: 'Calido, natural, texturas organicas' },
      { value: 'elegante', label: 'Elegante', desc: 'Sofisticado, clasico, refinado' },
    ];

    function ColorInput({ label, value, onChange }) {
      return (
        <div>
          <label className="block text-sm font-medium text-slate-700 mb-1.5">{label}</label>
          <div className="flex items-center gap-3">
            <input type="color" value={value} onChange={function(e) { onChange(e.target.value); }} className="w-12 h-10 rounded-lg border border-slate-300 cursor-pointer p-0.5" />
            <input type="text" value={value} onChange={function(e) { onChange(e.target.value); }} maxLength={7} className="flex-1 px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition font-mono text-sm" />
            <div className="w-10 h-10 rounded-lg border border-slate-200 shadow-inner" style={{ backgroundColor: value }} />
          </div>
        </div>
      );
    }

    function Step2Diseno({ form, updateField, onNext, onBack }) {
      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Diseño visual</h2>
          <p className="text-slate-500 mb-8">Defini la paleta de colores y el estilo de tus flyers.</p>
          <div className="space-y-5 mb-10">
            <ColorInput label="Color principal" value={form.colorPrincipal} onChange={function(v) { updateField('colorPrincipal', v); }} />
            <ColorInput label="Color secundario 1" value={form.colorSecundario1} onChange={function(v) { updateField('colorSecundario1', v); }} />
            <ColorInput label="Color secundario 2" value={form.colorSecundario2} onChange={function(v) { updateField('colorSecundario2', v); }} />
          </div>
          <div className="mb-10">
            <label className="block text-sm font-medium text-slate-700 mb-2">Preview de paleta</label>
            <div className="flex rounded-xl overflow-hidden h-14 shadow-sm border border-slate-200">
              <div className="flex-1" style={{ backgroundColor: form.colorPrincipal }} />
              <div className="flex-1" style={{ backgroundColor: form.colorSecundario1 }} />
              <div className="flex-1" style={{ backgroundColor: form.colorSecundario2 }} />
            </div>
          </div>
          <div className="mb-10">
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Tamano / Formato</label>
            <select value={form.tamano} onChange={function(e) { updateField('tamano', e.target.value); }} className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white">
              {tamanos.map(function(t) { return <option key={t.value} value={t.value}>{t.label} — {t.desc}</option>; })}
            </select>
          </div>
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-3">Estilo de diseño</label>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {estilos.map(function(s) { return (
                <button key={s.value} onClick={function() { updateField('estilo', s.value); }} className={'text-left px-4 py-3.5 rounded-xl border-2 transition-all ' + (form.estilo === s.value ? 'border-indigo-600 bg-indigo-50 ring-1 ring-indigo-600' : 'border-slate-200 hover:border-slate-300 bg-white')}>
                  <p className={'font-semibold text-sm ' + (form.estilo === s.value ? 'text-indigo-700' : 'text-slate-700')}>{s.label}</p>
                  <p className="text-xs text-slate-500 mt-0.5">{s.desc}</p>
                </button>
              ); })}
            </div>
          </div>
          <div className="flex justify-between mt-10">
            <button onClick={onBack} className="text-slate-600 hover:text-slate-800 font-medium py-2.5 px-6 rounded-lg transition-colors">← Anterior</button>
            <button onClick={onNext} className="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Siguiente →</button>
          </div>
        </div>
      );
    }

    // ========================
    // STEP 3
    // ========================
    const estiloLabels = { minimalista: 'Minimalista', moderno: 'Moderno', lujo: 'Lujo', rustico: 'Rustico', elegante: 'Elegante' };

    function Step3Resumen({ form, generatedPrompts, setGeneratedPrompts, addToHistory, onBack, onReset }) {
      const [copied, setCopied] = useState(null);
      const [allCopied, setAllCopied] = useState(false);
      function handleGenerate() {
        var prompts = generatePrompts(form);
        setGeneratedPrompts(prompts);
        addToHistory({ id: Date.now(), date: new Date().toISOString(), form: Object.assign({}, form), prompts: prompts });
      }
      function copyOne(text, index) { navigator.clipboard.writeText(text); setCopied(index); setTimeout(function() { setCopied(null); }, 1500); }
      function copyAll() {
        var allText = generatedPrompts.map(function(p, i) { return '=== PROMPT ' + (i + 1) + ' ===\n\n' + p; }).join('\n\n\n');
        navigator.clipboard.writeText(allText); setAllCopied(true); setTimeout(function() { setAllCopied(false); }, 2000);
      }
      return (
        <div>
          <h2 className="text-2xl font-bold text-slate-800 mb-1">Resumen y prompts</h2>
          <p className="text-slate-500 mb-8">Revisa la info y genera tus prompts.</p>
          <div className="bg-white rounded-xl border border-slate-200 p-6 mb-8 shadow-sm">
            <h3 className="font-semibold text-slate-700 mb-4 text-sm uppercase tracking-wider">Resumen</h3>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
              <div><span className="text-slate-500">Tipo:</span><span className="ml-2 font-medium text-slate-800">{form.tipoPropiedad}</span></div>
              <div><span className="text-slate-500">Precio:</span><span className="ml-2 font-medium text-slate-800">{form.precio}</span></div>
              <div className="sm:col-span-2"><span className="text-slate-500">Direccion:</span><span className="ml-2 font-medium text-slate-800">{form.direccion}</span></div>
              <div className="sm:col-span-2"><span className="text-slate-500">Descripcion:</span><span className="ml-2 text-slate-700">{form.descripcion}</span></div>
            </div>
            <div className="mt-5 pt-5 border-t border-slate-100">
              <div className="flex items-center gap-4 flex-wrap">
                <span className="text-sm text-slate-500">Paleta:</span>
                {[form.colorPrincipal, form.colorSecundario1, form.colorSecundario2].map(function(c, i) { return (
                  <div key={i} className="flex items-center gap-1.5">
                    <div className="w-6 h-6 rounded-md border border-slate-200" style={{ backgroundColor: c }} />
                    <span className="text-xs font-mono text-slate-600">{c}</span>
                  </div>
                ); })}
                <span className="text-sm text-slate-500 ml-2">Estilo:</span>
                <span className="text-sm font-medium text-indigo-600">{estiloLabels[form.estilo]}</span>
                <span className="text-sm text-slate-500 ml-2">Tamano:</span>
                <span className="text-sm font-medium text-indigo-600">{(tamanos.find(function(t) { return t.value === form.tamano; }) || {}).label || form.tamano}</span>
              </div>
            </div>
          </div>
          {!generatedPrompts && (
            <div className="text-center mb-8">
              <button onClick={handleGenerate} className="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-10 rounded-xl transition-colors shadow-md text-lg">Generar 10 Prompts</button>
            </div>
          )}
          {generatedPrompts && (
            <div>
              <div className="flex items-center justify-between mb-5">
                <h3 className="font-semibold text-slate-700">Prompts generados ({generatedPrompts.length})</h3>
                <button onClick={copyAll} className={'text-sm font-medium py-2 px-5 rounded-lg transition-colors ' + (allCopied ? 'bg-green-100 text-green-700' : 'bg-indigo-100 text-indigo-700 hover:bg-indigo-200')}>
                  {allCopied ? '✓ Copiados todos' : 'Copiar todos los prompts'}
                </button>
              </div>
              <div className="space-y-4">
                {generatedPrompts.map(function(prompt, i) { return (
                  <div key={i} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="flex items-center justify-between px-5 py-3 bg-slate-50 border-b border-slate-100">
                      <span className="text-sm font-semibold text-slate-600">
                        Prompt {i + 1} — <span className="text-indigo-600">{(styleVariants[form.estilo] && styleVariants[form.estilo][i]) ? styleVariants[form.estilo][i].name : ''}</span>
                      </span>
                      <button onClick={function() { copyOne(prompt, i); }} className={'text-xs font-medium py-1.5 px-4 rounded-md transition-colors ' + (copied === i ? 'bg-green-100 text-green-700' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100')}>
                        {copied === i ? '✓ Copiado' : 'Copiar'}
                      </button>
                    </div>
                    <pre className="p-5 text-sm text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">{prompt}</pre>
                  </div>
                ); })}
              </div>
            </div>
          )}
          <div className="flex justify-between mt-10">
            <button onClick={onBack} className="text-slate-600 hover:text-slate-800 font-medium py-2.5 px-6 rounded-lg transition-colors">← Anterior</button>
            {generatedPrompts && (
              <button onClick={onReset} className="bg-slate-800 hover:bg-slate-700 text-white font-medium py-2.5 px-8 rounded-lg transition-colors shadow-sm">Nuevo proyecto</button>
            )}
          </div>
        </div>
      );
    }

    // ========================
    // APP
    // ========================
    const INITIAL_FORM = { precio: '', direccion: '', tipoPropiedad: '', descripcion: '', colorPrincipal: '#1a1a2e', colorSecundario1: '#16213e', colorSecundario2: '#e94560', estilo: 'moderno', tamano: 'story' };

    function loadHistory() { try { return JSON.parse(localStorage.getItem('promptHistory') || '[]'); } catch (e) { return []; } }

    function App() {
      const [step, setStep] = useState(1);
      const [form, setForm] = useState(INITIAL_FORM);
      const [history, setHistory] = useState(loadHistory);
      const [generatedPrompts, setGeneratedPrompts] = useState(null);
      useEffect(function() { localStorage.setItem('promptHistory', JSON.stringify(history)); }, [history]);
      function updateField(field, value) { setForm(function(prev) { var n = Object.assign({}, prev); n[field] = value; return n; }); }
      function addToHistory(entry) { setHistory(function(prev) { return [entry].concat(prev).slice(0, 20); }); }
      function loadFromHistory(entry) { setForm(entry.form); setGeneratedPrompts(entry.prompts); setStep(3); }
      function resetForm() { setForm(INITIAL_FORM); setGeneratedPrompts(null); setStep(1); }
      return (
        <div className="flex h-screen bg-slate-50">
          <Sidebar history={history} onLoadEntry={loadFromHistory} onNewProject={resetForm} />
          <div className="flex-1 flex flex-col min-w-0">
            <ProgressBar currentStep={step} />
            <main className="flex-1 overflow-y-auto p-6 md:p-10">
              <div className="max-w-3xl mx-auto">
                {step === 1 && <Step1Textos form={form} updateField={updateField} onNext={function() { setStep(2); }} />}
                {step === 2 && <Step2Diseno form={form} updateField={updateField} onNext={function() { setStep(3); }} onBack={function() { setStep(1); }} />}
                {step === 3 && <Step3Resumen form={form} generatedPrompts={generatedPrompts} setGeneratedPrompts={setGeneratedPrompts} addToHistory={addToHistory} onBack={function() { setStep(2); }} onReset={resetForm} />}
              </div>
            </main>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
